# Build and test on manual runs. A v* tag additionally creates a GitHub Release.
name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test tests/TinyTools.Tests/TinyTools.Tests.csproj -c Release

      - name: Publish TinyTools (self-contained, single-file)
        run: |
          dotnet publish src/TinyTools/TinyTools.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableWindowsTargeting=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o publish

      - name: Zip artifact
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -ne "tag") { $version = "dev" }
          $zipName = "TinyTools-$version-win-x64.zip"
          Compress-Archive -Path publish\* -DestinationPath $zipName
          Write-Host "Created $zipName"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinyTools-win-x64
          path: TinyTools-*-win-x64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: TinyTools-*-win-x64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
